# ============================================================================
# Nyora Web — local stack.
#
#   nyora-web     : SPA + parser helper (Caddy :8080 → helper 127.0.0.1:8788)
#   flaresolverr  : Cloudflare-challenge solver the helper calls
#
# LOCAL:  web + helper + flaresolverr all run on your machine.
# REMOTE: only the sync backend (NYORA_SYNC_URL, default stream.hasanraza.tech).
#
#   docker compose up --build          # build + run
#   WEB_PORT=9000 docker compose up     # serve on host :9000
#   NYORA_SYNC_URL=https://my.sync docker compose up   # point sync elsewhere
# ============================================================================

services:
  nyora-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Which nyora-linux ref to build the parser helper from.
        NYORA_ENGINE_REF: ${NYORA_ENGINE_REF:-main}
    image: nyora-web:local
    restart: unless-stopped
    depends_on:
      # service_STARTED, not service_healthy: most sources need no Cloudflare
      # solve, and the helper degrades gracefully when FlareSolverr is
      # unreachable — so the web app must not be held hostage to the (qemu-
      # emulated, slow-to-warm) solver becoming healthy.
      flaresolverr:
        condition: service_started
    ports:
      - "${WEB_PORT:-8080}:8080"
    environment:
      # Sync stays REMOTE by default. Override to self-host sync elsewhere.
      NYORA_SYNC_URL: ${NYORA_SYNC_URL:-https://stream.hasanraza.tech}
      # Helper → FlareSolverr over the compose network (service DNS name).
      FLARESOLVERR_URL: http://flaresolverr:8191/v1
      NYORA_HELPER_PORT: "8788"
    volumes:
      # Persist the helper's SQLite DB + port file across restarts.
      - nyora-data:/data
    healthcheck:
      # Goes through Caddy's /api strip → helper /health (proves both).
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    # This ONE container runs BOTH the JVM helper and Caddy. The helper's JVM
    # ceiling alone is ~512m (-Xmx320m + MaxMetaspaceSize=128m +
    # ReservedCodeCacheSize=64m) before thread stacks, direct buffers used while
    # proxying /image bytes, and Caddy's ~30-50m — so a 512m cap (swap disabled)
    # would OOM-kill under load. 768m gives the VM's proven JVM flags headroom.
    mem_limit: 768m
    memswap_limit: 768m
    cpus: 1.5
    networks:
      - nyora

  flaresolverr:
    # NOTE: this image is amd64-first. On Apple Silicon Docker runs it under
    # emulation (qemu) — slower to start but functional for local use.
    image: ghcr.io/flaresolverr/flaresolverr:latest
    platform: linux/amd64
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      HEADLESS: "true"
      BROWSER_TIMEOUT: "45000"
    # Not published to the host — only the helper (same network) reaches it.
    expose:
      - "8191"
    healthcheck:
      # The image is Python-based (no curl); use the interpreter that's always
      # present. /health returns {"status":"ok"} when the browser is ready.
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8191/health', timeout=5).status==200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      # Generous warmup: on Apple Silicon this amd64 image runs under qemu, so
      # the headless browser can take well over 40s to become ready.
      start_period: 90s
    mem_limit: 700m
    networks:
      - nyora

networks:
  nyora:
    driver: bridge

volumes:
  nyora-data:
    driver: local
