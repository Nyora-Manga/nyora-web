<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Connecting…</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: grid; place-items: center;
      font: 14px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #0e0e11; color: #e7e7ea;
    }
    .card { text-align: center; padding: 24px 28px; }
    .dot {
      width: 26px; height: 26px; margin: 0 auto 14px;
      border: 3px solid #2a2a31; border-top-color: #8ab4ff; border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-color-scheme: light) {
      body { background: #fafafa; color: #1a1a1e; }
      .dot { border-color: #e4e4e8; border-top-color: #3b6cf0; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="dot" id="dot"></div>
    <p id="m">Finishing sign-in…</p>
  </div>
  <!-- External script: the site CSP is hash-pinned (no 'unsafe-inline'), but
       'self' scripts are allowed, so the relay lives in /oauth.js. -->
  <script src="/oauth.js"></script>
</body>
</html>
