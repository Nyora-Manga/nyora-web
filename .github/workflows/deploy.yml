name: Deploy web → cluster

# Pushing to the `deploy` branch builds the bundle once and rsyncs it to ALL
# THREE nodes behind web.nyora.xyz (round-robin DNS): nyora, expo-vm, claw.
# Each node's Caddy serves the app from /var/www/nyora-web (also fronting the
# legacy nyoramanga.hasanraza.tech redirect). Deploying only one node leaves the
# other ⅔ of visitors on a stale build — hence the matrix.
#
# Repo secrets required:
#   DEPLOY_SSH_KEY      — private key of the CI cluster deploy key (in each
#                         node's <user> authorized_keys)
#   DEPLOY_KNOWN_HOSTS  — ssh-keyscan lines for all three node IPs
on:
  push:
    branches: [deploy]
  workflow_dispatch:

concurrency:
  group: deploy-nyora-web
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # The onnxruntime runtime (~35 MB, 24 MB of it wasm) is not committed —
      # it's fetched here and SHA-256 verified against pinned hashes, so the
      # deployed bundle self-hosts it without carrying it in git history.
      # This workflow only runs on `deploy`, so it's the deploy path only.
      - name: Fetch onnxruntime runtime (verified)
        run: npm run fetch:ort

      - name: Build — bundle web/ into dist/
        run: |
          npm install --no-audit --no-fund
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Matrix carries only harmless node NAMES (they become the public job name).
      # Each node's IP/user/etc. is looked up from the DEPLOY_NODES secret at runtime
      # and the IP is masked in logs — so nothing sensitive appears in the workflow,
      # the job name, or the run logs.
      matrix:
        node: [nyora, expo-vm, claw]
    steps:
      - name: Resolve node from DEPLOY_NODES (mask IP in logs)
        run: |
          host=$(jq -r --arg n "${{ matrix.node }}" '.[$n].host'    <<<'${{ secrets.DEPLOY_NODES }}')
          user=$(jq -r --arg n "${{ matrix.node }}" '.[$n].user'    <<<'${{ secrets.DEPLOY_NODES }}')
          selinux=$(jq -r --arg n "${{ matrix.node }}" '.[$n].selinux' <<<'${{ secrets.DEPLOY_NODES }}')
          echo "::add-mask::$host"
          { echo "HOST=$host"; echo "SSH_USER=$user"; echo "SELINUX=$selinux"; } >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Rsync dist/ → ${{ matrix.node }}
        run: |
          rsync -az --delete \
            --exclude='env.js.bak*' \
            --exclude='_*.html' \
            -e "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes" \
            dist/ "$SSH_USER@$HOST:/var/www/nyora-web/"

      - name: SELinux restorecon
        if: ${{ env.SELINUX == 'true' }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes \
            "$SSH_USER@$HOST" \
            'sudo restorecon -R /var/www/nyora-web || true'

      - name: Smoke check ${{ matrix.node }} directly
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 \
              --resolve web.nyora.xyz:443:"$HOST" https://web.nyora.xyz/ || true)
            echo "  ${{ matrix.node }} attempt $i → HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 3
          done
          echo "::error::${{ matrix.node }} not serving after deploy"
          exit 1

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Public hosts respond
        run: |
          check() {
            for i in 1 2 3 4 5; do
              code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 "$1" || true)
              echo "  $1 attempt $i → HTTP $code"
              [ "$code" = "200" ] && return 0
              sleep 3
            done
            echo "::error::$1 did not return 200 after deploy"
            return 1
          }
          check https://web.nyora.xyz/ && check https://nyoramanga.hasanraza.tech/
